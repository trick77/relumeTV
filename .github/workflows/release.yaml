name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: ver
        name: Compute next version
        run: |
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          LATEST=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          LATEST="${LATEST:-0.0.0}"
          IFS=. read -r MA MI PA <<< "$LATEST"
          case "$BUMP" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          NEXT="$MA.$MI.$PA"
          SHORT=$(git rev-parse --short HEAD)
          # GHCR repository names must be lowercase; the repo slug contains "relume-tv".
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "major=$MA"     >> "$GITHUB_OUTPUT"
          echo "minor=$MI"     >> "$GITHUB_OUTPUT"
          echo "short=$SHORT"  >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"  >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST -> $NEXT ($BUMP) at $SHORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RELUME_TV_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.major }}.${{ steps.ver.outputs.minor }}
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.major }}
            ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.short }}
            ${{ steps.ver.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
